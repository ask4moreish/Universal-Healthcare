name: universal-healthcare

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack.
#
# Two profiles:
#   --profile postgres   (default, prod-parity) → starts postgres alongside
#   --profile sqlite                          → zero-dependency dev
#
# Always-on services (any profile): api, minio, mailpit, minio-bucket-init
#
# Quick start (Postgres):
#   cp .env.example .env
#   docker compose --profile postgres up
#
# Quick start (SQLite):
#   docker compose --profile sqlite up
#   # uses DATABASE_URL=file:/data/dev.db via the default in api's env block
#
# Healthchecks:
#   - /readyz             on the api (DB ping with 2s timeout)
#   - pg_isready          on postgres
#   - minio /minio/health/live  on minio
#   - HTTP 200 on :8025   on mailpit
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: [postgres, sqlite]
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${API_DATABASE_URL:-file:/data/dev.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set it in .env)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TRUST_PROXY: "true"
      EMAIL_FROM: ${EMAIL_FROM:-noreply@universal-healthcare.local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # MinIO (S3-compatible)
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-avatars}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://minio:9000}
      # Sentry (no-op if SENTRY_DSN is empty)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-docker}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      minio:
        condition: service_healthy
      minio-bucket-init:
        condition: service_completed_successfully
    volumes:
      - sqlite-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uhdn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uhdn}
      POSTGRES_DB: ${POSTGRES_DB:-uhdn}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER:-uhdn}" -d "$${POSTGRES_DB:-uhdn}"
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: [postgres, sqlite]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-bucket-init:
    image: minio/mc:latest
    profiles: [postgres, sqlite]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      (mc mb --ignore-existing local/$${AWS_S3_BUCKET:-avatars} || true) &&
      (mc anonymous set download local/$${AWS_S3_BUCKET:-avatars} || true) &&
      echo 'bucket ready: $${AWS_S3_BUCKET:-avatars}'
      "
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    profiles: [postgres, sqlite]
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit-data:/data
    ports:
      - "1025:1025"  # SMTP (use this in EMAIL_* overrides if you swap to SMTP)
      - "8025:8025"  # Web UI: http://localhost:8025
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  mailpit-data:
  sqlite-data:
